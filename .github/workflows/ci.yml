name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JS dependencies
        run: npm ci

      - name: Test
        id: test
        run: |
          # Run Jest and capture output
          JEST_OUTPUT=$(npx jest --coverage --forceExit 2>&1) || true
          echo "$JEST_OUTPUT"
          JEST_COUNT=$(echo "$JEST_OUTPUT" | grep -oE 'Tests:.*[0-9]+ passed' | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+')

          # Run Android tests
          cd android && ./gradlew :app:testDebugUnitTest --rerun-tasks && cd ..
          ANDROID_COUNT=0
          for xml in android/app/build/test-results/testDebugUnitTest/TEST-*.xml; do
            count=$(grep -oE 'tests="[0-9]+"' "$xml" | grep -oE '[0-9]+')
            ANDROID_COUNT=$((ANDROID_COUNT + count))
          done

          # Run iOS tests
          cd ios && xcodebuild test \
            -workspace OffgridMobile.xcworkspace \
            -scheme OffgridMobile \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:OffgridMobileTests \
            2>&1 | (xcpretty 2>/dev/null || cat) && cd ..
          IOS_COUNT=$(grep -c 'func test' ios/OffgridMobileTests/OffgridMobileTests.swift 2>/dev/null || echo 0)

          TOTAL=$((JEST_COUNT + ANDROID_COUNT + IOS_COUNT))
          echo "jest_count=$JEST_COUNT" >> "$GITHUB_OUTPUT"
          echo "android_count=$ANDROID_COUNT" >> "$GITHUB_OUTPUT"
          echo "ios_count=$IOS_COUNT" >> "$GITHUB_OUTPUT"
          echo "total_count=$TOTAL" >> "$GITHUB_OUTPUT"

          # Fail if Jest reported failures
          echo "$JEST_OUTPUT" | grep -q '0 failed' || echo "$JEST_OUTPUT" | grep -qv 'failed'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Update test count badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.TEST_BADGE_GIST_ID }}
          filename: off-grid-mobile-test-count.json
          label: tests
          message: ${{ steps.test.outputs.total_count }} passing
          color: brightgreen

      - name: Upload iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore

      - name: Upload Android test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: android/app/build/reports/tests/
          if-no-files-found: ignore

  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build Android Debug
        run: cd android && ./gradlew assembleDebug

      - name: Build Android Release
        run: cd android && ./gradlew assembleRelease
